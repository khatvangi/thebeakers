<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genetic Code Optimality — The Beakers</title>
  <style>
    body { margin: 0; background: #0a0a0f; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
    #sketch-container { position: relative; cursor: pointer; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
</head>
<body>
  <div id="sketch-container"></div>
  <script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
var CT={AAA:"K",AAC:"N",AAG:"K",AAU:"N",ACA:"T",ACC:"T",ACG:"T",ACU:"T",AGA:"R",AGC:"S",AGG:"R",AGU:"S",AUA:"I",AUC:"I",AUG:"M",AUU:"I",CAA:"Q",CAC:"H",CAG:"Q",CAU:"H",CCA:"P",CCC:"P",CCG:"P",CCU:"P",CGA:"R",CGC:"R",CGG:"R",CGU:"R",CUA:"L",CUC:"L",CUG:"L",CUU:"L",GAA:"E",GAC:"D",GAG:"E",GAU:"D",GCA:"A",GCC:"A",GCG:"A",GCU:"A",GGA:"G",GGC:"G",GGG:"G",GGU:"G",GUA:"V",GUC:"V",GUG:"V",GUU:"V",UAC:"Y",UAU:"Y",UCA:"S",UCC:"S",UCG:"S",UCU:"S",UGC:"C",UGG:"W",UGU:"C",UUA:"L",UUC:"F",UUG:"L",UUU:"F"};
var SC=Object.keys(CT), BA=["A","U","G","C"];
var PCA={A:[-0.64,-2.89,-0.40,-1.25,1.34,-0.49,-1.61,0.16],C:[0.10,-1.72,1.28,0.14,-1.87,-0.39,-0.31,0.79],D:[2.81,-1.02,-2.58,1.69,-0.62,0.01,0.46,-0.80],E:[2.03,0.34,-4.45,0.75,0.12,0.07,-0.51,-0.44],F:[-3.98,0.25,0.12,0.98,0.76,0.61,-0.20,-0.17],G:[3.36,-3.85,1.62,-0.75,1.14,2.66,0.34,0.08],H:[0.83,1.95,0.46,1.55,1.00,0.59,-0.96,-0.05],I:[-3.83,-1.02,-0.34,-1.70,-0.36,0.06,0.58,-0.47],K:[2.10,3.64,0.26,-2.08,0.64,-0.47,-0.17,-0.12],L:[-3.45,-0.98,-0.55,-1.48,0.00,-0.42,0.35,-0.24],M:[-1.61,0.07,-1.44,-0.83,-0.21,-0.30,-0.14,1.94],N:[2.83,-0.33,0.28,0.72,0.09,-0.14,1.48,0.36],P:[0.92,-2.20,2.06,2.08,1.53,-2.60,0.41,-0.29],Q:[1.52,0.88,-1.04,-0.14,0.32,0.00,1.12,0.91],R:[2.28,4.99,1.30,-2.40,0.37,-0.14,0.09,-0.39],S:[3.02,-1.01,1.06,0.02,-1.27,-0.08,-1.10,-0.10],T:[1.46,0.02,0.63,-0.22,-1.85,-0.44,-0.27,-0.28],V:[-3.63,-1.63,-0.07,-1.71,-0.36,0.04,0.49,-0.90],W:[-4.26,2.63,0.26,2.55,0.57,0.61,-0.01,0.30],Y:[-1.87,1.86,1.53,2.08,-1.35,0.82,-0.05,-0.27]};
var ACOL={A:[230,120,60],V:[210,90,50],L:[220,100,55],I:[200,80,45],M:[190,70,40],F:[180,60,35],W:[170,50,30],S:[70,160,200],T:[80,170,210],N:[60,150,190],Q:[90,180,220],Y:[100,140,180],C:[50,130,170],K:[150,80,180],R:[130,60,160],H:[170,100,200],D:[80,180,80],E:[100,200,100],G:[140,140,140],P:[140,100,70]};

// class names for legend
var AA_CLASS={A:"hydrophobic",V:"hydrophobic",L:"hydrophobic",I:"hydrophobic",M:"hydrophobic",F:"aromatic",W:"aromatic",S:"polar",T:"polar",N:"polar",Q:"polar",Y:"polar",C:"polar",K:"positive",R:"positive",H:"positive",D:"negative",E:"negative",G:"special",P:"special"};

function l2(a,b){var s=0;for(var i=0;i<a.length;i++){var d=a[i]-b[i];s+=d*d;}return Math.sqrt(s);}
function neighbors(c){var n=[];for(var i=0;i<c.length;i++)for(var j=0;j<4;j++)if(BA[j]!==c[i])n.push(c.slice(0,i)+BA[j]+c.slice(i+1));return n;}
function computeD(codons,asgn,vecs){var t=0,c=0;for(var i=0;i<codons.length;i++){var cd=codons[i],lb=asgn[cd];if(!lb||!vecs[lb])continue;var vc=vecs[lb],ne=neighbors(cd),ls=0,lc=0;for(var j=0;j<ne.length;j++){var nl=asgn[ne[j]];if(!nl||!vecs[nl])continue;ls+=l2(vc,vecs[nl]);lc++;}if(lc>0){t+=ls/lc;c++;}}return c>0?t/c:0;}
function shuffleCode(codons,orig){var lb=[];for(var i=0;i<codons.length;i++)lb.push(orig[codons[i]]);for(var i=lb.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),tmp=lb[i];lb[i]=lb[j];lb[j]=tmp;}var n={};for(var i=0;i<codons.length;i++)n[codons[i]]=lb[i];return n;}

// build SGC assignment
var SGC_ASGN={};for(var k in CT)SGC_ASGN[k]=CT[k];
var SGC_D=computeD(SC,SGC_ASGN,PCA);

// ═══════════════════════════════════════════════
// SKETCH
// ═══════════════════════════════════════════════
var W=850,H=540;
var BG=[12,12,20],PBG=[20,22,32],TP=[230,235,245],TD=[140,145,160];
var AC=[100,180,255],GC=[255,200,60],TR=[255,90,90];

var stage=0; // 0=intro, 1=SGC, 2=one shuffle, 3=slow sim, 4=fast sim, 5=done
var t=0;

// simulation state
var simCount=0, simCountLe=0, simRunning=false, simDone=false;
var wN=0,wMean=0,wM2=0;
var TOTAL=1000000;
var histBins=60, bins=new Array(histBins).fill(0), histLo=0, histHi=1, histReady=false;

// slow phase: individual shuffles with animation
var slowQueue=[]; // {d, assignment, age, ball:{x,y,vy,landed}}
var slowInterval=30; // frames between slow shuffles (0.5 sec at 60fps)
var slowTimer=0;
var slowPhaseCount=0;
var SLOW_PHASE_MAX=30; // do 30 slow shuffles before ramping
var rampBatch=10; // starts small, grows

// current displayed assignment
var currentAsgn=null;
var currentD=null;

// falling balls for histogram
var balls=[];

function setup(){
  createCanvas(W,H).parent("sketch-container");
  textFont("monospace");
}

function welfordPush(v){wN++;var d=v-wMean;wMean+=d/wN;var d2=v-wMean;wM2+=d*d2;}
function welfordStd(){return wN>1?Math.sqrt(wM2/(wN-1)):0;}

function calibrate(){
  var samples=[];
  for(var i=0;i<300;i++){var sh=shuffleCode(SC,SGC_ASGN);samples.push(computeD(SC,sh,PCA));}
  var m=0;for(var i=0;i<samples.length;i++)m+=samples[i];m/=samples.length;
  var v=0;for(var i=0;i<samples.length;i++)v+=(samples[i]-m)*(samples[i]-m);var s=Math.sqrt(v/(samples.length-1));
  histLo=Math.min(SGC_D-s,m-4*s); histHi=m+4*s; histReady=true;
  for(var i=0;i<samples.length;i++){
    welfordPush(samples[i]);
    var idx=Math.floor((samples[i]-histLo)/(histHi-histLo)*histBins);
    if(idx>=0&&idx<histBins)bins[idx]++;
    if(samples[i]<=SGC_D)simCountLe++;
    simCount++;
  }
}

function draw(){
  t=millis()*0.001;
  background(BG[0],BG[1],BG[2]);

  if(stage<=2){
    // full-screen graph mode
    drawFullGraph();
  } else {
    // simulation mode: graph left, histogram right
    drawSimGraph();
    drawHistogram();
  }
  drawBottomBar();

  // run simulation logic
  if(stage===3) runSlowSim();
  if(stage===4) runFastSim();
}

// ═══════════════════════════════════════════════
// FULL-SCREEN GRAPH (stages 0-2)
// ═══════════════════════════════════════════════
function drawFullGraph(){
  var asgn=(stage>=2&&currentAsgn)?currentAsgn:SGC_ASGN;
  var isSGC=!(stage>=2&&currentAsgn);
  var ex="GCU";
  var ne=neighbors(ex);
  var cx=320,cy=260,radius=140;

  // title
  fill(AC[0],AC[1],AC[2]); textSize(16); textAlign(LEFT,TOP);
  text("Genetic Code Optimality",20,15);

  // build layout
  var layout=[{codon:ex,x:cx,y:cy}];
  for(var i=0;i<ne.length;i++){
    var angle=(i/ne.length)*TWO_PI-HALF_PI;
    layout.push({codon:ne[i],x:cx+radius*Math.cos(angle),y:cy+radius*Math.sin(angle)});
  }

  var centerLabel=asgn[layout[0].codon];
  var synC=0,nonC=0;

  // edges
  for(var i=1;i<layout.length;i++){
    var nb=layout[i],nbLab=asgn[nb.codon]; if(!nbLab)continue;
    var same=centerLabel===nbLab;
    if(same){synC++;stroke(80,160,255,180);}else{nonC++;stroke(255,80,80,120);}
    strokeWeight(same?3:2);
    line(layout[0].x,layout[0].y,nb.x,nb.y);
  }

  // nodes
  for(var i=0;i<layout.length;i++){
    var nd=layout[i],lb=asgn[nd.codon]; if(!lb)continue;
    var col=ACOL[lb]||[150,150,150];
    var isC=i===0,r=isC?32:22;
    var breathe=Math.sin(t*2+i*0.5)*2;
    noStroke();
    fill(col[0],col[1],col[2],25); circle(nd.x,nd.y,r*2+breathe+12);
    fill(col[0],col[1],col[2]); circle(nd.x,nd.y,r*2+breathe);
    // AA inside
    fill(0); textSize(isC?14:10); textAlign(CENTER,CENTER);
    text(lb,nd.x,nd.y);
    // codon label outside
    fill(200,205,220); textSize(isC?11:9);
    var dx=nd.x-cx,dy=nd.y-cy,dist=Math.sqrt(dx*dx+dy*dy)||1;
    var ld=r+14+breathe/2;
    var lx=isC?nd.x:nd.x+(dx/dist)*ld, ly=isC?nd.y-r-12:nd.y+(dy/dist)*ld;
    text(nd.codon,lx,ly);
    // class name for outer nodes
    if(!isC){
      fill(col[0],col[1],col[2],100); textSize(7);
      text(AA_CLASS[lb]||"",lx,ly+10);
    }
  }

  // right side info panel
  var px=560,py=60,pw=270;
  fill(PBG[0],PBG[1],PBG[2],200); noStroke();
  rect(px,py,pw,stage===0?0:400,8);

  if(stage>=1){
    fill(TP[0],TP[1],TP[2]); textSize(13); textAlign(LEFT,TOP);
    text(isSGC?"Standard Genetic Code":"Shuffled Code",px+15,py+15);

    // D score
    fill(isSGC?GC[0]:TR[0],isSGC?GC[1]:TR[1],isSGC?GC[2]:TR[2]);
    textSize(28); text("D = "+(isSGC?SGC_D:currentD||0).toFixed(2),px+15,py+45);

    // edge counts
    var ey=py+90;
    fill(80,160,255); textSize(11); textAlign(LEFT,TOP);
    text("\u2022 "+synC+" synonymous edges",px+15,ey);
    fill(TD[0],TD[1],TD[2]); textSize(9);
    text("  same amino acid \u2192 no damage",px+15,ey+16);

    fill(255,80,80); textSize(11);
    text("\u2022 "+nonC+" nonsynonymous edges",px+15,ey+38);
    fill(TD[0],TD[1],TD[2]); textSize(9);
    text("  different amino acid \u2192 potential damage",px+15,ey+54);

    // explanation
    var ty=ey+82;
    fill(TD[0],TD[1],TD[2]); textSize(10); textAlign(LEFT,TOP);
    if(isSGC){
      text("D measures average physicochemical",px+15,ty);
      text("distance between a codon's amino",px+15,ty+14);
      text("acid and its neighbors' amino acids.",px+15,ty+28);
      ty+=50;
      text("Lower D = errors cause less damage.",px+15,ty);
      text("The SGC has remarkably low D.",px+15,ty+14);
      ty+=36;
      fill(GC[0],GC[1],GC[2]); textSize(11);
      text("Is this just luck?",px+15,ty);
      text("Let's shuffle and find out...",px+15,ty+16);
    } else {
      text("We shuffled the amino acid labels",px+15,ty);
      text("while keeping the same degeneracy",px+15,ty+14);
      text("structure (same # of codons per AA).",px+15,ty+28);
      ty+=50;
      var diff=((currentD||0)-SGC_D).toFixed(2);
      fill(TR[0],TR[1],TR[2]); textSize(12);
      text("D went up by "+diff,px+15,ty);
      fill(TD[0],TD[1],TD[2]); textSize(10);
      text("More red edges = more damage",px+15,ty+18);
      text("from translation errors.",px+15,ty+32);
      ty+=56;
      fill(AC[0],AC[1],AC[2]); textSize(11);
      text("Was this one shuffle unlucky?",px+15,ty);
      text("Let's try a million more...",px+15,ty+16);
    }
  }

  // intro overlay
  if(stage===0){
    fill(12,12,20,220); rect(40,50,W-80,H-120,12);
    fill(TP[0],TP[1],TP[2]); textSize(22); textAlign(CENTER,TOP);
    text("How Optimized Is the Genetic Code?",W/2,80);
    fill(TD[0],TD[1],TD[2]); textSize(12);
    var intro=["","64 codons map to 20 amino acids.","Is this mapping random, or carefully optimized","to minimize damage from translation errors?","",
      "We'll show you the answer with 1,000,000 shuffles.",""];
    var iy=120;
    for(var i=0;i<intro.length;i++){text(intro[i],W/2,iy);iy+=20;}
    var pulse=Math.sin(t*3)*5;
    fill(AC[0],AC[1],AC[2]); textSize(16);
    text("Click anywhere to begin",W/2,iy+15+pulse);
  }
}

// ═══════════════════════════════════════════════
// SIMULATION MODE (stages 3-5)
// ═══════════════════════════════════════════════
function drawSimGraph(){
  var asgn=currentAsgn||SGC_ASGN;
  var ex="GCU",ne=neighbors(ex);
  var panelW=250,panelH=350;
  var cx=125,cy=200,radius=70;
  var px=10,py=80;

  fill(PBG[0],PBG[1],PBG[2]); stroke(40,45,60); strokeWeight(1);
  rect(px,py,panelW,panelH,8);
  noStroke(); fill(TD[0],TD[1],TD[2]); textSize(8); textAlign(CENTER,TOP);
  text("CURRENT SHUFFLE",px+panelW/2,py+6);

  // title area
  fill(AC[0],AC[1],AC[2]); textSize(13); textAlign(LEFT,TOP);
  text("Genetic Code Optimality",10,15);
  fill(TD[0],TD[1],TD[2]); textSize(10);
  text("61 codons \u2192 20 amino acids | 1M Monte Carlo shuffles",10,33);

  var layout=[{codon:ex,x:cx,y:cy}];
  for(var i=0;i<ne.length;i++){
    var angle=(i/ne.length)*TWO_PI-HALF_PI;
    layout.push({codon:ne[i],x:cx+radius*Math.cos(angle),y:cy+radius*Math.sin(angle)});
  }

  var centerLabel=asgn[layout[0].codon];

  // edges
  for(var i=1;i<layout.length;i++){
    var nb=layout[i],nbLab=asgn[nb.codon]; if(!nbLab)continue;
    var same=centerLabel===nbLab;
    if(same){stroke(80,160,255,180);}else{stroke(255,80,80,120);}
    strokeWeight(same?2:1.2);
    line(layout[0].x+px,layout[0].y+py,nb.x+px,nb.y+py);
  }

  // nodes
  for(var i=0;i<layout.length;i++){
    var nd=layout[i],lb=asgn[nd.codon]; if(!lb)continue;
    var col=ACOL[lb]||[150,150,150];
    var isC=i===0,r=isC?18:12;
    var breathe=Math.sin(t*2+i*0.5)*1;
    noStroke();
    fill(col[0],col[1],col[2],25); circle(nd.x+px,nd.y+py,r*2+breathe+6);
    fill(col[0],col[1],col[2]); circle(nd.x+px,nd.y+py,r*2+breathe);
    fill(0); textSize(isC?8:6); textAlign(CENTER,CENTER);
    text(lb,nd.x+px,nd.y+py);
  }

  // D score big
  noStroke();
  var dVal=currentD||SGC_D;
  fill(TR[0],TR[1],TR[2]); textSize(16); textAlign(CENTER,TOP);
  text("D = "+dVal.toFixed(2),px+panelW/2,py+panelH-55);

  // SGC reference
  fill(GC[0],GC[1],GC[2]); textSize(9);
  text("SGC: D = "+SGC_D.toFixed(2),px+panelW/2,py+panelH-35);

  // counter
  fill(TD[0],TD[1],TD[2]); textSize(8);
  text(simCount.toLocaleString()+" shuffles",px+panelW/2,py+panelH-18);
}

function drawHistogram(){
  var px=270,py=55,pw=570,ph=430;

  fill(PBG[0],PBG[1],PBG[2]); stroke(40,45,60); strokeWeight(1);
  rect(px,py,pw,ph,8);

  noStroke(); fill(TD[0],TD[1],TD[2]); textSize(9); textAlign(CENTER,TOP);
  text("WHERE DO RANDOM CODES LAND?",px+pw/2,py+8);

  var hx=px+50,hy=py+35,hw=pw-80,hh=ph-120;
  var barW=hw/histBins;

  // find max bin
  var maxBin=1;
  for(var i=0;i<histBins;i++) if(bins[i]>maxBin) maxBin=bins[i];

  // draw bars as stacked dots
  var maxDotsPerCol=60;
  for(var i=0;i<histBins;i++){
    if(bins[i]===0)continue;
    var bx=hx+i*barW+barW/2;
    var dotsToShow=Math.min(Math.ceil((bins[i]/maxBin)*maxDotsPerCol),maxDotsPerCol);
    var barH=(bins[i]/maxBin)*hh;
    var dotSpacing=Math.min(barH/dotsToShow,4);
    var frac=i/histBins;
    var cr=Math.round(60+frac*50),cg=Math.round(130+frac*50),cb=Math.round(210-frac*90);

    for(var d=0;d<dotsToShow;d++){
      var dy=hy+hh-d*dotSpacing-2;
      if(dy<hy)break;
      var wob=Math.sin(t*1.2+i*0.3+d*0.5)*0.4;
      fill(cr,cg,cb,190); noStroke();
      circle(bx+wob,dy,3.5);
    }
  }

  // falling balls
  for(var bi=balls.length-1;bi>=0;bi--){
    var b=balls[bi];
    b.vy+=0.6;
    b.y+=b.vy;
    if(b.y>=hh){balls.splice(bi,1);continue;}
    var bx=hx+b.frac*hw;
    var by=hy+b.y;
    if(by>hy&&by<hy+hh){
      // ball
      fill(255,255,255,240); noStroke();
      circle(bx,by,5);
      // D value label floating with ball
      if(b.y<hh*0.5){
        fill(255,255,255,150); textSize(7); textAlign(CENTER,BOTTOM);
        text(b.d.toFixed(1),bx,by-6);
      }
      // trail
      fill(255,255,255,40);
      circle(bx,by-5,3); circle(bx,by-10,2);
    }
  }

  // SGC golden line
  var sgcFrac=(SGC_D-histLo)/(histHi-histLo);
  var sgcX=hx+sgcFrac*hw;
  if(sgcX>=hx&&sgcX<=hx+hw){
    var pulse=Math.sin(t*3)*0.3+0.7;
    stroke(GC[0],GC[1],GC[2],30*pulse); strokeWeight(12);
    line(sgcX,hy,sgcX,hy+hh);
    stroke(GC[0],GC[1],GC[2],220); strokeWeight(2.5);
    line(sgcX,hy,sgcX,hy+hh);
    noStroke(); fill(GC[0],GC[1],GC[2]);
    textSize(11); textAlign(CENTER,BOTTOM);
    text("\u2190 SGC (D="+SGC_D.toFixed(2)+")",sgcX+2,hy-6);
  }

  // x-axis
  noStroke(); fill(TD[0],TD[1],TD[2]); textSize(8); textAlign(CENTER,TOP);
  for(var i=0;i<=4;i++){
    var val=histLo+(histHi-histLo)*(i/4);
    text(val.toFixed(1),hx+(i/4)*hw,hy+hh+5);
  }
  textSize(9); text("Noise Distortion D (lower = better error protection)",hx+hw/2,hy+hh+20);

  // stats panel on right side of histogram
  var sx=px+pw-180, sy=hy+hh-140;
  fill(PBG[0],PBG[1],PBG[2],230); noStroke();
  rect(sx,sy,170,135,6); stroke(50,55,70); strokeWeight(1); noFill();
  rect(sx,sy,170,135,6); noStroke();

  var sty=sy+8;
  fill(TD[0],TD[1],TD[2]); textSize(8); textAlign(CENTER,TOP);
  text("LIVE STATISTICS",sx+85,sty); sty+=16;

  function sRow(lab,val,col){
    fill(TD[0],TD[1],TD[2]); textSize(9); textAlign(LEFT,TOP); text(lab,sx+10,sty);
    fill(col[0],col[1],col[2]); textAlign(RIGHT,TOP); text(val,sx+160,sty); sty+=15;
  }

  sRow("SGC Score",SGC_D.toFixed(2),GC);
  sRow("Null Mean",wMean.toFixed(2),TP);
  var z=welfordStd()>0?(SGC_D-wMean)/welfordStd():0;
  var zCol=Math.abs(z)>5?[255,80,80]:[255,180,60];
  sRow("z-score",z.toFixed(2),zCol);
  sty+=4;

  // drama counter
  fill(simCountLe===0?[100,255,100]:[255,200,60]);
  fill(100,255,100); textSize(14); textAlign(CENTER,TOP);
  text(simCountLe+" / "+simCount.toLocaleString(),sx+85,sty);
  sty+=18;
  fill(TD[0],TD[1],TD[2]); textSize(7); textAlign(CENTER,TOP);
  text("codes that beat the SGC",sx+85,sty);

  // counter at bottom
  fill(TP[0],TP[1],TP[2]); textSize(12); textAlign(CENTER,BOTTOM);
  text(simCount.toLocaleString()+" / 1,000,000",px+pw/2,py+ph-10);

  // done message
  if(simDone&&simCountLe===0){
    var flash=Math.sin(t*2)*0.3+0.7;
    fill(100,255,100,220*flash); textSize(13); textAlign(CENTER,CENTER);
    text("1,000,000 random codes \u2014 NONE reached the SGC",px+pw/2,py+ph-35);
  }
}

// ═══════════════════════════════════════════════
// SLOW SIMULATION (stage 3)
// ═══════════════════════════════════════════════
function runSlowSim(){
  slowTimer++;
  // gradually speed up: start at 30 frames/shuffle, end at 3 frames/shuffle
  var interval=Math.max(3, Math.round(30-slowPhaseCount*0.9));

  if(slowTimer>=interval){
    slowTimer=0;
    // do one shuffle
    var sh=shuffleCode(SC,SGC_ASGN);
    var d=computeD(SC,sh,PCA);
    welfordPush(d);
    var idx=Math.floor((d-histLo)/(histHi-histLo)*histBins);
    if(idx>=0&&idx<histBins) bins[idx]++;
    if(d<=SGC_D) simCountLe++;
    simCount++;
    currentAsgn=sh;
    currentD=d;
    slowPhaseCount++;

    // spawn a falling ball
    var frac=(d-histLo)/(histHi-histLo);
    if(frac>=0&&frac<=1) balls.push({frac:frac,y:0,vy:0,d:d});

    // transition to fast phase after SLOW_PHASE_MAX
    if(slowPhaseCount>=SLOW_PHASE_MAX){
      stage=4;
      rampBatch=50;
    }
  }
}

// ═══════════════════════════════════════════════
// FAST SIMULATION (stage 4)
// ═══════════════════════════════════════════════
function runFastSim(){
  // ramp up batch size gradually
  if(rampBatch<3000) rampBatch=Math.min(3000,Math.round(rampBatch*1.05));

  var batchEnd=Math.min(simCount+rampBatch,TOTAL);
  var spawnEvery=Math.max(1,Math.floor(rampBatch/4));
  var lc=0;

  while(simCount<batchEnd){
    var sh=shuffleCode(SC,SGC_ASGN);
    var d=computeD(SC,sh,PCA);
    welfordPush(d);
    var idx=Math.floor((d-histLo)/(histHi-histLo)*histBins);
    if(idx>=0&&idx<histBins)bins[idx]++;
    if(d<=SGC_D)simCountLe++;
    simCount++;
    currentAsgn=sh;
    currentD=d;
    lc++;
    if(lc%spawnEvery===0&&balls.length<10){
      var frac=(d-histLo)/(histHi-histLo);
      if(frac>=0&&frac<=1)balls.push({frac:frac,y:0,vy:0,d:d});
    }
  }
  if(simCount>=TOTAL){simDone=true;stage=5;}
}

// ═══════════════════════════════════════════════
// BOTTOM BAR
// ═══════════════════════════════════════════════
function drawBottomBar(){
  noStroke(); fill(TD[0],TD[1],TD[2]); textSize(9); textAlign(CENTER,BOTTOM);
  var labels=["Click anywhere to begin",
    "The real genetic code \u2014 click to shuffle it",
    "One random shuffle \u2014 click to test 1,000,000",
    "Slow simulation... watching each shuffle",
    "Accelerating... "+simCount.toLocaleString()+" shuffles",
    "Done \u2014 the SGC is deeply optimized"];
  var label=labels[Math.min(stage,5)];
  text(label,W/2,H-8);

  // stage dots
  var dotY=H-22;
  for(var i=0;i<=5;i++){
    var dx=W/2+(i-2.5)*14;
    if(i<=stage){fill(AC[0],AC[1],AC[2]);}else{fill(50,55,70);}
    circle(dx,dotY,i===stage?6:4);
  }
}

// ═══════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════
function advance(){
  if(stage===0){stage=1;}
  else if(stage===1){
    // do one shuffle
    currentAsgn=shuffleCode(SC,SGC_ASGN);
    currentD=computeD(SC,currentAsgn,PCA);
    stage=2;
  }
  else if(stage===2){
    // start simulation
    if(!histReady) calibrate();
    stage=3;
    slowTimer=0;
    slowPhaseCount=0;
  }
  // stages 3-5: clicking doesn't skip (let it play)
}

function mousePressed(){advance();}
window.addEventListener("keydown",function(e){
  if(e.key==="ArrowRight"){e.preventDefault();advance();}
  else if(e.key==="ArrowLeft"){e.preventDefault();if(stage>0&&stage<=2){stage--;currentAsgn=null;currentD=null;}}
  else if(e.key===" "){e.preventDefault();advance();}
});
  </script>
